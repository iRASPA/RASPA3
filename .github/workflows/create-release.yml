          chmod a+x ninja
          mv ninja /usr/bin/
          cmake -B ${{github.workspace}}/build --preset linux-x86_64-core-avx2-redhat-10
      - name: create-raspa-rpm-package
        shell: bash
        run: |
          ninja -C ${{github.workspace}}/build package
          mv ${{github.workspace}}/build/raspa-${{ github.event.inputs.version }}-1.el10.x86_64.rpm .
      - name: upload-release-asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
