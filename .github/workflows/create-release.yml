  linux-x86_64-core-avx2-archlinux-job:
    runs-on: ubuntu-latest
    needs: release-job 
    container: 
      image: archlinux:base
    steps: 
      - name: checkout-repository 
        uses: actions/checkout@v4 
        with:  
          path: src 
      - name: create-package 
        shell: bash 
        run: | 
          pacman -Sy --noconfirm
          pacman -S --noconfirm vi vim git wget debugedit unzip
          pacman -S --noconfirm python3 pybind11 libxml2-legacy
          pacman -S --noconfirm gcc make cmake openmp ninja hdf5
          pacman -S --noconfirm blas64 lapack64
          pacman -S --noconfirm fftw ocl-icd opencl-headers
          pacman -S --noconfirm fakeroot shadow
          pacman -S --needed --noconfirm sudo
          useradd builduser -m
          passwd -d builduser
          printf 'builduser ALL=(ALL) ALL\n' | tee -a /etc/sudoers
          rm -f /var/cache/pacman/pkg/*
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz
          xz -d -v LLVM-22.1.1-Linux-X64.tar.xz
          tar -xf LLVM-22.1.1-Linux-X64.tar -C /usr --strip-components=1
          rm -f LLVM-22.1.1-Linux-ARM64.tar
          ldconfig
          cp -r src /tmp/src 
          cd /tmp/ 
          chown -R nobody src 
          cp src/packaging/PKGBUILD-core-avx2 ./PKGBUILD 
          sudo -u nobody makepkg -e 
          cd - 
          cp /tmp/raspa-${{ github.event.inputs.version }}-1-x86_64.pkg.tar.zst .
      - name: upload-release-asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release-job.outputs.upload_url }}
          asset_path: ./raspa-${{ github.event.inputs.version }}-1-x86_64.pkg.tar.zst
          asset_name: raspa-${{ github.event.inputs.version }}-1-x86_64-core-avx2.pkg.tar.zst
          asset_content_type: application/octet-stream


# x86_64 linux avx512
# =====================================================================================================================

  linux-x86_64-skylake-avx512-ubuntu-26-job:
    runs-on: ubuntu-latest
    needs: release-job
    container:
      image: ubuntu:26.04
    steps:
      - name: checkout-repository
        uses: actions/checkout@v6
      - name: configure-cmake-raspa
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive TZ=Europe/Amsterdam apt-get -y install tzdata
          apt-get install -y --no-install-recommends git ca-certificates openssl libssl-dev binutils binutils-dev
          apt-get install -y --no-install-recommends lsb-release wget software-properties-common gnupg
          apt-get install -y --no-install-recommends python3 pybind11-dev python3-pybind11 python3-dev
          apt-get install -y --no-install-recommends liblapack-dev libomp5 make xz-utils unzip gcc
          apt-get install -y --no-install-recommends liblapack64-dev libblas64-dev libxml2-dev
          apt-get install -y --no-install-recommends ocl-icd-opencl-dev
          apt-get install -y --no-install-recommends libfftw3-dev libhdf5-dev
          ln -s /usr/lib/x86_64-linux-gnu/libxml2.so.16 /usr/lib/libxml2.so.2
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz
          xz -d -v LLVM-22.1.1-Linux-X64.tar.xz
          tar -xf LLVM-22.1.1-Linux-X64.tar -C /usr --strip-components=1
          rm -f LLVM-22.1.1-Linux-X64.tar
          wget https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0-linux-x86_64.sh
          sh ./cmake-4.3.0-linux-x86_64.sh --skip-license --prefix=/usr
          rm cmake-4.3.0-linux-x86_64.sh
          wget https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux.zip
          unzip ninja-linux.zip
          chmod a+x ninja
          mv ninja /usr/bin/
          cmake -B ${{github.workspace}}/build --preset linux-x86_64-skylake-avx512-ubuntu-26
      - name: create-raspa-deb-package
        shell: bash
        run: |
          ninja -C ${{github.workspace}}/build package
          mv ${{github.workspace}}/build/raspa_${{ github.event.inputs.version }}_amd64.deb .
      - name: upload-release-asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release-job.outputs.upload_url }}
          asset_path: ./raspa_${{ github.event.inputs.version }}_amd64.deb
          asset_name: raspa_${{ github.event.inputs.version }}_amd64_ubuntu-26_skylake-avx512.deb
          asset_content_type: application/octet-stream

