        shell: bash
        run: |
          zypper install -y --no-recommends wget git ca-certificates cmake ninja libstdc++-devel gcc gcc-c++ binutils-devel
          zypper install -y --no-recommends python3 python3-devel
          zypper install -y --no-recommends lapack-devel blas-devel xz unzip libxml2 libomp17-devel
          zypper install -y --no-recommends ocl-icd-devel opencl-headers libOpenCL1 fftw3-devel
          zypper install -y rpm-build git
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-ARM64.tar.xz
          xz -d -v LLVM-22.1.1-Linux-ARM64.tar.xz
          tar -xf LLVM-22.1.1-Linux-ARM64.tar -C /usr --strip-components=1
          rm -f LLVM-22.1.1-Linux-ARM64.tar
          wget https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0-linux-aarch64.sh
          sh ./cmake-4.3.0-linux-aarch64.sh --skip-license --prefix=/usr
          rm -f cmake-4.3.0-linux-aarch64.sh
          wget https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux-aarch64.zip
          unzip ninja-linux-aarch64.zip
          chmod a+x ninja
          mv ninja /usr/bin/
          cmake -B ${{github.workspace}}/build --preset linux-aarch64-opensuse-leap-15.6
      - name: create-raspa-rpm-package
        shell: bash
        run: |
          ninja -C ${{github.workspace}}/build package
          mv ${{github.workspace}}/build/raspa-${{ github.event.inputs.version }}-1.aarch64.rpm .
      - name: upload-release-asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release-job.outputs.upload_url }}
          asset_path: ./raspa-${{ github.event.inputs.version }}-1.aarch64.rpm
          asset_name: raspa-${{ github.event.inputs.version }}-1.opensuse-leap-15.6.aarch64.rpm
          asset_content_type: application/octet-stream

