          upload_url: ${{ needs.release-job.outputs.upload_url }}
          asset_path: ./raspa-${{ github.event.inputs.version }}-1.el10.x86_64.rpm
          asset_name: raspa-${{ github.event.inputs.version }}-1.el10.x86_64.core-avx2.rpm
