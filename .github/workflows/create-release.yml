  linux-x86_64-core-avx2-rocky-10-job:
    runs-on: ubuntu-latest
    needs: release-job
    container:
      image: rockylinux/rockylinux:10
    steps:
      - name: checkout-repository
        uses: actions/checkout@v6
      - name: configure-cmake-raspa
        shell: bash
        run: |
          dnf update -y 
          dnf install -y 'dnf-command(config-manager)' 
          dnf config-manager --set-enabled crb 
          dnf install -y --setopt=install_weak_deps=False  git wget binutils binutils-devel 
          dnf install -y --setopt=install_weak_deps=False  rpm-build 
          dnf install -y --setopt=install_weak_deps=False  openssl-devel 
          dnf install -y --setopt=install_weak_deps=False  epel-release 
          dnf install -y --setopt=install_weak_deps=False  epel-release 
          dnf install -y --setopt=install_weak_deps=False  clang llvm libomp zlib-static 
          dnf install -y perl 
          dnf install -y --setopt=install_weak_deps=False  lapack-devel lapack blas
          dnf --enablerepo=devel install -y --setopt=install_weak_deps=False python3 python3-devel python3-pybind11 
          dnf --enablerepo=devel install -y --setopt=install_weak_deps=False pybind11-devel 
          dnf --enablerepo=devel install -y --setopt=install_weak_deps=False fftw-devel 
          dnf --enablerepo=devel install -y --setopt=install_weak_deps=False ocl-icd-devel
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz
          xz -d -v LLVM-22.1.1-Linux-X64.tar.xz
          tar -xf LLVM-22.1.1-Linux-X64.tar -C /usr --strip-components=1
          rm -f LLVM-22.1.1-Linux-X64.tar
          wget https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0-linux-x86_64.sh
          sh ./cmake-4.3.0-linux-x86_64.sh --skip-license --prefix=/usr
          rm -f cmake-4.3.0-linux-x86_64.sh
          wget https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux.zip
