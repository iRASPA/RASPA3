  linux-aarch64-archlinux-job: 
    runs-on: ubuntu-24.04-arm
    needs: release-job 
    container: 
      image: pkgforge/archlinux
    steps: 
      - name: checkout-repository 
        uses: actions/checkout@v4 
        with:  
          path: src 
      - name: create-package 
        shell: bash 
        run: | 
          pacman -Sy --noconfirm
          pacman -S --noconfirm vi vim git wget debugedit unzip
          pacman -S --noconfirm python3 pybind11 libxml2-legacy
          pacman -S --noconfirm gcc make cmake openmp ninja hdf5
          pacman -S --noconfirm blas64 lapack64
          pacman -S --noconfirm fftw ocl-icd opencl-headers
          pacman -S --noconfirm fakeroot shadow
          pacman -S --needed --noconfirm sudo
          useradd builduser -m
          passwd -d builduser
          printf 'builduser ALL=(ALL) ALL\n' | tee -a /etc/sudoers
          rm -f /var/cache/pacman/pkg/*
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-ARM64.tar.xz
          xz -d -v LLVM-22.1.1-Linux-ARM64.tar.xz 
          tar -xf LLVM-22.1.1-Linux-ARM64.tar -C /usr --strip-components=1
          rm -f LLVM-22.1.1-Linux-ARM64.tar
          cp -r src /tmp/src 
          cd /tmp/ 
          chown -R nobody src 
          cp src/packaging/PKGBUILD-arm64 ./PKGBUILD 
          sudo -u nobody makepkg -e 
          cd - 
          cp /tmp/raspa-${{ github.event.inputs.version }}-1-aarch64.pkg.tar.xz . 
      - name: upload-release-asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release-job.outputs.upload_url }}
          asset_path: ./raspa-${{ github.event.inputs.version }}-1-aarch64.pkg.tar.xz
          asset_name: raspa-${{ github.event.inputs.version }}-1-aarch64.pkg.tar.xz
          asset_content_type: application/octet-stream
